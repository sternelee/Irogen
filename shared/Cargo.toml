[package]
name = "clawdchat-shared"
version = "0.1.0"
edition = "2024"

[features]
default = ["std"]
std = [
    "tokio/full",
    "tracing-subscriber/env-filter",
    "dirs",
    "agent-client-protocol",
    "tokio-util",
    "gethostname",
    "libc",
    "portable-pty",
    "zeroclaw",
    "codex-core",
    "codex-protocol",
    "codex-apply-patch",
    "codex-login",
    "codex-arg0",
    "codex-mcp-server",
]
# Mobile runtime: excludes agent-specific dependencies (Claude SDK, Codex, ACP agents)
# and disables git operations to reduce binary size
mobile = [
    "tokio/full",
    "tracing-subscriber/env-filter",
    "dirs",
    "zeroclaw/tauri",
    "zeroclaw/mobile",
]
tokio-full = ["tokio"]
wasm = []
tauri-runtime = ["zeroclaw/tauri", "zeroclaw"]
desktop-runtime = ["zeroclaw/desktop", "zeroclaw"]
mobile-runtime = ["zeroclaw/mobile", "zeroclaw"]

[dependencies]
anyhow = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
iroh = { workspace = true }
iroh-tickets = { workspace = true }
bincode = { workspace = true }
chacha20poly1305 = { workspace = true }
aead = { workspace = true }
rand = { workspace = true }
data-encoding = "2.6"
url = "2.5"
futures = { workspace = true }
futures-util = "0.3"
tokio = { workspace = true, optional = true }
tracing = { workspace = true }
regex = "1.10"
dirs = { version = "5.0", optional = true }
base64 = { workspace = true }
hex = { workspace = true }
postcard = "1.1.1"
n0-future = "0.3"
uuid = { workspace = true }
async-trait = "0.1"
iroh-base = { workspace = true }
tracing-subscriber = { version = "0.3", optional = true }

# Agent related dependencies
agent-client-protocol = { version = "0.9.4", optional = true }
tokio-util = { version = "0.7", features = ["compat"], optional = true }
gethostname = { version = "0.5", optional = true }
thiserror = "1.0"
libc = { version = "0.2", optional = true }
portable-pty = { workspace = true, optional = true }
bytes = { workspace = true }
zeroclaw = { path = "../zeroclaw", optional = true }

# Codex ACP dependencies (git)
[dependencies.codex-core]
git = "https://github.com/zed-industries/codex"
branch = "acp"
optional = true

[dependencies.codex-protocol]
git = "https://github.com/zed-industries/codex"
branch = "acp"
optional = true

[dependencies.codex-apply-patch]
git = "https://github.com/zed-industries/codex"
branch = "acp"
optional = true

[dependencies.codex-login]
git = "https://github.com/zed-industries/codex"
branch = "acp"
optional = true

[dependencies.codex-arg0]
git = "https://github.com/zed-industries/codex"
branch = "acp"
optional = true

[dependencies.codex-mcp-server]
git = "https://github.com/zed-industries/codex"
branch = "acp"
optional = true
