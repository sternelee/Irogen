name: "Development Build and Test"

on:
  push:
    branches: [ main, app ]
  pull_request:
    branches: [ main, app ]
  workflow_dispatch: # Allow manual triggering

env:
  CARGO_TERM_COLOR: always

jobs:
  # Test code quality and compilation
  test:
    name: Test and Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check code formatting
        run: cargo fmt --all -- --check

      - name: Run clippy lints
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests
        run: cargo test --workspace --verbose

      - name: Build all components
        run: cargo build --workspace --verbose

  # Frontend build test
  test-frontend:
    name: Frontend Build Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: pnpm tsc

      - name: Build frontend
        run: pnpm build

      - name: Run preview build
        run: pnpm preview &

      # Add browser tests if needed
      # - name: Run browser tests
      #   run: npm test

  # Build CLI for development
  build-cli-dev:
    name: Build CLI (Development)
    needs: [test, test-frontend]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build CLI
        run: cargo build -p cli --release

      - name: Test CLI functionality
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            ./target/release/cli.exe --help
          else
            ./target/release/cli --help
          fi
        shell: bash

  # Build Tauri app for development
  build-desktop-dev:
    name: Build Desktop App (Development)
    needs: [test, test-frontend]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            args: ""
          - os: macos-latest
            args: ""
          - os: windows-latest
            args: ""

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri app (development mode)
        run: pnpm tauri build -- --debug

      - name: Upload development artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-dev-${{ matrix.os }}
          path: |
            src-tauri/target/debug/bundle/
            app/target/debug/bundle/
          retention-days: 7

  # Security audit
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit

      - name: Check for outdated dependencies
        run: cargo install cargo-outdated && cargo outdated

  # Generate and upload build report
  build-report:
    name: Build Report
    needs: [test, test-frontend, build-cli-dev, build-desktop-dev]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate build report
        run: |
          cat > build-report.md << 'EOF'
          # RiTerm Build Report

          ## Build Information
          - **Commit**: ${{ github.sha }}
          - **Branch**: ${{ github.ref_name }}
          - **Workflow Run**: ${{ github.run_id }}
          - **Triggered By**: ${{ github.event_name }}

          ## Component Status
          - **Rust Tests**: ${{ needs.test.result }}
          - **Frontend Build**: ${{ needs.test-frontend.result }}
          - **CLI Build**: ${{ needs.build-cli-dev.result }}
          - **Desktop Build**: ${{ needs.build-desktop-dev.result }}
          - **Security Audit**: ${{ needs.security-audit.result }}

          ## Artifacts
          Development builds are available for download from the Actions tab.

          ## Next Steps
          For release builds, push a tag (e.g., `v1.0.0`) to trigger the release workflow.
          EOF

      - name: Upload build report
        uses: actions/upload-artifact@v4
        with:
          name: build-report
          path: build-report.md
          retention-days: 30