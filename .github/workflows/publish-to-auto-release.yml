name: "publish-auto-release"

on:
  push:
    tags:
      - "v*"

# This workflow builds both CLI and Tauri app, then creates a GitHub release with both artifacts

jobs:
  build-cli:
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - platform: "ubuntu-latest"
            target: "x86_64-unknown-linux-gnu"
          - platform: "macos-latest"
            target: "x86_64-apple-darwin"
          - platform: "macos-latest"
            target: "aarch64-apple-darwin"
          - platform: "windows-latest"
            target: "x86_64-pc-windows-msvc"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build CLI
        run: cargo build -p cli --release --target ${{ matrix.target }}

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/cli
            target/${{ matrix.target }}/release/cli.exe

  publish-tauri:
    permissions:
      contents: write
    needs: build-cli
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # for Arm based macs (M1 and above).
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest" # for Intel based macs.
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04" # for Tauri v1 you could replace this with ubuntu-20.04.
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "pnpm"

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04' # This must match the platform value defined above.
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
        # webkitgtk 4.0 is for Tauri v1 - webkitgtk 4.1 is for Tauri v2.
        # You can remove the one that doesn't apply to your app to speed up the workflow a bit.

      - name: install frontend dependencies
        run: pnpm install # change this to npm, pnpm or bun depending on which one you use.

      - name: build frontend dist
        run: pnpm build

      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          path: cli-artifacts

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version.
          releaseName: "App v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload CLI to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: cli-artifacts/**/*
          tag: ${{ github.ref }}
          file_glob: true
          overwrite: true

  publish-to-release:
    # This job publishes the compiled artifacts to a separate release repository (sternelee/riterm-release).
    # It depends on 'publish-tauri' to ensure all artifacts are built and uploaded to the primary release first.
    needs: publish-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create and upload assets to a GitHub Release.
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4
        # This step checks out the current repository to access the workflow context
        # (e.g., GITHUB_REF for the tag name that triggered the workflow).

      - name: Download all workflow artifacts
        uses: actions/download-artifact@v4
        with:
          # Downloads all artifacts generated by previous jobs in this workflow run.
          # These artifacts (CLI and Tauri app builds) will be placed into the 'downloaded-artifacts' directory.
          path: downloaded-artifacts

      - name: Get tag name
        id: get_tag_name
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        # Extracts the release tag name (e.g., 'v1.0.0' from 'refs/tags/v1.0.0').

      - name: Install GitHub CLI
        run: |
          # The GitHub CLI 'gh' is used to interact with GitHub API for release management.
          # It's usually pre-installed on GitHub Actions runners, but this ensures its presence.
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Create GitHub Release in sternelee/riterm-release
        env:
          # IMPORTANT: Ensure 'GITHUB_TOKEN' is configured as a repository secret
          # with write access to the 'sternelee/riterm-release' repository.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="${{ steps.get_tag_name.outputs.TAG_NAME }}"
          echo "Attempting to create release '$RELEASE_TAG' in sternelee/riterm-release..."
          # Creates a new GitHub Release in the specified target repository.
          # --target links the release to the commit SHA from the *source* repository.
          # --prerelease flag is set if the tag contains 'beta' or 'alpha'.
          # The '|| true' allows the workflow to continue even if the release already exists (e.g., on re-run).
          gh release create "$RELEASE_TAG" \
            --repo sternelee/riterm-release \
            --title "Release $RELEASE_TAG" \
            --notes "Automated release of iroh-code-remote assets. See original repository for more details." \
            --prerelease=${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') }} \
            --target "${{ github.sha }}" || true

      - name: Upload artifacts to sternelee/riterm-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="${{ steps.get_tag_name.outputs.TAG_NAME }}"
          echo "Uploading artifacts to release '$RELEASE_TAG' in sternelee/riterm-release..."
          # Finds all downloaded artifact files and uploads them to the newly created (or existing) release.
          # The --clobber flag ensures that if an asset with the same name already exists, it will be overwritten.
          find downloaded-artifacts -type f -print0 | xargs -0 -I {} \
            gh release upload "$RELEASE_TAG" "{}" --repo sternelee/riterm-release \
            --clobber
