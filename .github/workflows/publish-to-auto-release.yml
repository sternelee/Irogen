name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-cli:
    name: Build CLI ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: cli
            asset_name: clawdchat_cli-linux-amd64

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: cli
            asset_name: clawdchat_cli-darwin-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: cli
            asset_name: clawdchat_cli-darwin-arm64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: cli.exe
            asset_name: clawdchat_cli-windows-amd64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact_name: cli.exe
            asset_name: clawdchat_cli-windows-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build CLI release binary
        run: cargo build -p cli --release --target ${{ matrix.target }}

      - name: Strip binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Prepare artifact
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "${{ matrix.artifact_name }}" "${{ matrix.asset_name }}.exe"
          else
            cp "${{ matrix.artifact_name }}" "${{ matrix.asset_name }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.asset_name }}${{ runner.os == 'Windows' && '.exe' || '' }}

  build-tauri:
    name: Build App ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify pnpm
        run: pnpm --version

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS Rust targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app with official Tauri action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ClawdChat ${{ github.ref_name }}
          releaseBody: See CLI archives and app installers in this release.
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          projectPath: app
          tauriScript: pnpm tauri
          args: ${{ matrix.args }}

  build-android:
    name: Build App Android
    runs-on: ubuntu-latest
    outputs:
      has_android_secrets: ${{ steps.check-secrets.outputs.has_android_secrets }}
    env:
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}

    steps:
      - name: Check Android signing secrets
        id: check-secrets
        shell: bash
        run: |
          if [[ -n "$ANDROID_KEY_ALIAS" && -n "$ANDROID_KEY_PASSWORD" && -n "$ANDROID_KEY_BASE64" ]]; then
            echo "has_android_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_android_secrets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip Android build (missing signing secrets)
        if: steps.check-secrets.outputs.has_android_secrets != 'true'
        run: echo "Skipping Android build because signing secrets are not configured."

      - name: Checkout code
        if: steps.check-secrets.outputs.has_android_secrets == 'true'
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: steps.check-secrets.outputs.has_android_secrets == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        if: steps.check-secrets.outputs.has_android_secrets == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust toolchain (Android targets)
        if: steps.check-secrets.outputs.has_android_secrets == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Setup Java
        if: steps.check-secrets.outputs.has_android_secrets == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Setup Android SDK
        if: steps.check-secrets.outputs.has_android_secrets == 'true'
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        if: steps.check-secrets.outputs.has_android_secrets == 'true'
        run: pnpm install --frozen-lockfile

      - name: Set up Android signing
        if: steps.check-secrets.outputs.has_android_secrets == 'true'
        shell: bash
        run: |
          cd app/gen/android
          cat > keystore.properties << EOF
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          password=${{ secrets.ANDROID_KEY_PASSWORD }}
          storeFile=$RUNNER_TEMP/upload-keystore.jks
          EOF
          echo "${{ secrets.ANDROID_KEY_BASE64 }}" | base64 -d > "$RUNNER_TEMP/upload-keystore.jks"

      - name: Build Android app (APK + AAB)
        if: steps.check-secrets.outputs.has_android_secrets == 'true'
        run: pnpm tauri android build --config app/tauri.conf.json --target aarch64-linux-android --apk --aab

      - name: Upload Android artifacts
        if: steps.check-secrets.outputs.has_android_secrets == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: clawdchat_android
          if-no-files-found: error
          path: |
            app/gen/android/app/build/outputs/apk/**/release/*.apk
            app/gen/android/app/build/outputs/bundle/**/release/*.aab

  release:
    name: Publish Release Assets
    if: ${{ needs.build-cli.result == 'success' && needs.build-tauri.result == 'success' && (needs.build-android.result == 'success' || needs.build-android.result == 'skipped') }}
    needs:
      - build-cli
      - build-tauri
      - build-android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: clawdchat_cli-*
          merge-multiple: false
          path: dist

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: clawdchat_android
          path: dist/android

      - name: Show downloaded files
        run: ls -lahR dist

      - name: Create archives for CLI artifacts
        shell: bash
        run: |
          cd dist
          for dir in */; do
            dir_name="${dir%/}"
            binary_name="$(basename "$dir_name")"

            if [[ "$binary_name" == *"windows"* ]]; then
              zip -j "${binary_name}.zip" "${dir_name}/${binary_name}.exe"
            else
              tar -czf "${binary_name}.tar.gz" -C "$dir_name" "$binary_name"
            fi
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip > checksums.txt

      - name: Upload CLI archives to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
            dist/android/**/*.apk
            dist/android/**/*.aab
          draft: false
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          generate_release_notes: true
          append_body: true
          body: |
            ## CLI Downloads

            - Linux AMD64: `clawdchat_cli-linux-amd64.tar.gz`
            - macOS AMD64: `clawdchat_cli-darwin-amd64.tar.gz`
            - macOS ARM64: `clawdchat_cli-darwin-arm64.tar.gz`
            - Windows AMD64: `clawdchat_cli-windows-amd64.zip`
            - Windows ARM64: `clawdchat_cli-windows-arm64.zip`
