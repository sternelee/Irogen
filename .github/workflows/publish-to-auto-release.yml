name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-cli:
    name: Build CLI ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: cli
            asset_name: clawdchat-linux-amd64

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: cli
            asset_name: clawdchat-darwin-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: cli
            asset_name: clawdchat-darwin-arm64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: cli.exe
            asset_name: clawdchat-windows-amd64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact_name: cli.exe
            asset_name: clawdchat-windows-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build CLI release binary
        run: cargo build -p cli --release --target ${{ matrix.target }}

      - name: Strip binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Prepare artifact
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "${{ matrix.artifact_name }}" "${{ matrix.asset_name }}.exe"
          else
            cp "${{ matrix.artifact_name }}" "${{ matrix.asset_name }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.asset_name }}${{ runner.os == 'Windows' && '.exe' || '' }}

  build-tauri:
    name: Build App ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS Rust targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app with official Tauri action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ClawdChat ${{ github.ref_name }}
          releaseBody: See CLI archives and app installers in this release.
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          projectPath: app
          tauriScript: pnpm tauri
          args: ${{ matrix.args }}

  release:
    name: Publish Release Assets
    needs:
      - build-cli
      - build-tauri
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all CLI artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Show downloaded files
        run: ls -lahR dist

      - name: Create archives for CLI artifacts
        shell: bash
        run: |
          cd dist
          for dir in */; do
            dir_name="${dir%/}"
            binary_name="$(basename "$dir_name")"

            if [[ "$binary_name" == *"windows"* ]]; then
              zip -j "${binary_name}.zip" "${dir_name}/${binary_name}.exe"
            else
              tar -czf "${binary_name}.tar.gz" -C "$dir_name" "$binary_name"
            fi
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip > checksums.txt

      - name: Upload CLI archives to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          draft: false
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          generate_release_notes: true
          append_body: true
          body: |
            ## CLI Downloads

            - Linux AMD64: `clawdchat-linux-amd64.tar.gz`
            - macOS AMD64: `clawdchat-darwin-amd64.tar.gz`
            - macOS ARM64: `clawdchat-darwin-arm64.tar.gz`
            - Windows AMD64: `clawdchat-windows-amd64.zip`
            - Windows ARM64: `clawdchat-windows-arm64.zip`
